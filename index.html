  <!-- Tailwind v4 Theme-Konfiguration mit Brand-Tokens -->
  <style type="text/tailwindcss">
    @theme {
      /* Basis-Farben */
      --color-ink: #0F172A;
      --color-body: #475569;
      --color-line: #E2E8F0;
      --color-sand: #F8F4EC;

      /* Primärfarbe: Tiefes Ostsee-Petrol */
      --color-primary-50:  #EAF4F7;
      --color-primary-100: #D1E5EC;
      --color-primary-200: #A3CCD9;
      --color-primary-300: #6DAEC1;
      --color-primary-400: #3A8FA9;
      --color-primary-500: #0B4F6C;
      --color-primary-600: #0A4660;
      --color-primary-700: #073A50;
      --color-primary-800: #052D3F;
      --color-primary-900: #03212F;

      /* Akzentfarbe: Warmes Amber/Bernstein */
      --color-accent-50:  #FEF6E5;
      --color-accent-100: #FCEAC0;
      --color-accent-200: #F8D78B;
      --color-accent-300: #F4C457;
      --color-accent-400: #F2B544;
      --color-accent-500: #E29E1E;
      --color-accent-600: #B47A14;
      --color-accent-700: #85590E;

      /* Typografie */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

      /* Erweiterte Border-Radii */

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    :root {
      --primary: #0B4F6C;
      --primary-dark: #073A50;
      --primary-soft: #EAF4F7;
      --accent: #F2B544;
      --accent-dark: #B47A14;
      --ink: #0F172A;
      --body: #475569;
      --line: #E2E8F0;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Inter', -apple-system, sans-serif; color: var(--body); line-height: 1.65; background: #fff; }
    ::selection { background: var(--primary); color: #fff; }

    /* Headline-Tracking moderner */
    h1, h2, h3, h4 { letter-spacing: -.025em; color: var(--ink); }
    h1 { letter-spacing: -.04em; }

    /* Container */
    .wio-container { width: min(100% - 2rem, 1200px); margin-inline: auto; }

    /* Sticky Nav States */
    .wio-nav {
      transition: background 220ms ease, box-shadow 220ms ease, padding 220ms ease;
    }
    .wio-nav.is-scrolled {
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 6px 22px rgba(15, 23, 42, .08);
      backdrop-filter: blur(12px);
    }

    /* Photo-Placeholder mit Gradient (Hauptbilder) */
    .wio-photo {
      position: relative;
      border-radius: 32px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background:
        radial-gradient(ellipse at 18% 20%, rgba(255,255,255,.85), transparent 0 12rem),
        radial-gradient(ellipse at 85% 90%, rgba(242,181,68,.25), transparent 0 14rem),
        linear-gradient(135deg, #D1E5EC 0%, #EAF4F7 60%, #FEF6E5 100%);
      display: grid;
      place-items: center;
    }
    /* Querformat-Variante (3:2) für Reportagebilder */
    .wio-photo.wio-photo-wide { aspect-ratio: 3 / 2; }
    .wio-photo-portrait {
      aspect-ratio: 3 / 4;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.75), transparent 0 9rem),
        linear-gradient(160deg, #D1E5EC 0%, #EAF4F7 70%, #F8F4EC 100%);
    }
    /* Coach-Porträts werden im Original 4:5 generiert */
    .wio-photo-portrait.wio-photo-portrait-45 { aspect-ratio: 4 / 5; }
    .wio-photo-square {
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(242,181,68,.30), transparent 0 11rem),
        radial-gradient(ellipse at 15% 85%, rgba(11,79,108,.22), transparent 0 10rem),
        linear-gradient(135deg, #EAF4F7 0%, #FEF6E5 100%);
    }

    /* Bilder, die in einem Foto-Container liegen, füllen ihn pixelgenau aus */
    .wio-photo > picture, .wio-photo-portrait > picture, .wio-photo-square > picture { position: absolute; inset: 0; display: block; }
    .wio-photo > picture > img,
    .wio-photo-portrait > picture > img,
    .wio-photo-square > picture > img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
    }

    /* =========================================================
       EDIT-MODUS · Adressierungs-Plaketten (visuell nur im Edit-Modus)
       ========================================================= */
    .edit-target { position: relative; }

    body.edit-mode .edit-target {
      outline: 1px dashed rgba(242, 181, 68, .55);
      outline-offset: 2px;
      transition: outline-color .15s;
    }
    body.edit-mode .edit-target:hover {
      outline: 2px solid #F2B544;
      outline-offset: 3px;
    }

    .edit-marker {
      position: absolute;
      top: -10px; left: -2px;
      z-index: 9000;
      font-family: ui-monospace, 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 10px; line-height: 1;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      white-space: nowrap;
      max-width: 320px;
      overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -.01em;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      transform: translateZ(0); /* eigener Stacking-Kontext */
      opacity: .35;
      transition: opacity .15s, background .15s, transform .15s;
      display: none;
    }
    body.edit-mode .edit-marker { display: inline-block; }
    body.edit-mode .edit-target:hover > .edit-marker,
    body.edit-mode .edit-target:hover .edit-marker {
      opacity: 1;
      transform: translateY(-1px) translateZ(0);
    }
    body.edit-mode .edit-marker:hover { opacity: 1 !important; }

    .edit-marker-section { background: #0B4F6C; color: #fff; }
    .edit-marker-block   { background: #F2B544; color: #1a1a1a; }
    .edit-marker-leaf    { background: #fff;    color: #0B4F6C; border: 1px solid #0B4F6C; font-weight: 600; }

    .edit-marker-flash {
      background: #16A34A !important; color: #fff !important;
      border-color: #16A34A !important;
      animation: edit-flash .9s ease-out;
    }
    @keyframes edit-flash {
      0%   { transform: scale(1.25); }
      30%  { transform: scale(1); }
      100% { transform: scale(1); }
    }

    /* Toggle unten rechts */
    .edit-toggle {
      position: fixed; right: 20px; bottom: 20px;
      z-index: 9999;
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 999px;
      padding: 4px;
      box-shadow: 0 6px 18px rgba(15,23,42,.18);
      opacity: .65;
      transition: opacity .2s, box-shadow .2s;
    }
    .edit-toggle:hover { opacity: 1; }
    .edit-toggle-active {
      opacity: 1;
      border-color: #F2B544;
      box-shadow: 0 8px 24px rgba(242, 181, 68, .35);
    }
    .edit-toggle-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: #475569;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      border-radius: 999px;
    }
    .edit-toggle-active .edit-toggle-btn {
      background: #0B4F6C; color: #fff;
    }
    .edit-toggle-help {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid #E2E8F0;
      background: #F8F4EC;
      color: #0B4F6C;
      font-weight: 700; font-size: 14px;
      cursor: pointer;
      margin-right: 4px;
    }
    .edit-toggle-help:hover { background: #FEF6E5; }

    /* Help-Overlay */
    .edit-help {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(4px);
      display: grid; place-items: center;
      padding: 20px;
    }
    .edit-help-card {
      position: relative;
      background: #fff;
      border-radius: 24px;
      padding: 32px 32px 28px;
      max-width: 460px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }
    .edit-help-card h3 { margin: 0 0 14px; font-size: 22px; font-weight: 800; color: #0F172A; }
    .edit-help-card p  { margin: 0 0 12px; line-height: 1.55; color: #475569; }
    .edit-help-card ul { margin: 0 0 16px; padding-left: 20px; line-height: 1.7; color: #475569; }
    .edit-help-card code { background: #F1F5F9; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #0B4F6C; }
    .edit-help-tip { font-size: 13px; color: #94A3B8; font-style: italic; }
    .edit-help-close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: #F1F5F9; color: #475569;
      border: none; cursor: pointer;
      display: grid; place-items: center;
    }
    .edit-help-close:hover { background: #E2E8F0; }
    .edit-legend {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      font-weight: 700;
      margin-right: 4px;
    }
    .edit-legend-section { background: #0B4F6C; color: #fff; }
    .edit-legend-block   { background: #F2B544; color: #1a1a1a; }
    .edit-legend-leaf    { background: #fff;    color: #0B4F6C; border: 1px solid #0B4F6C; }


    /* Initialen-Avatar in Portrait */
    .wio-portrait-mono {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }
    .wio-portrait-mono .ring {
      width: 60%;
      aspect-ratio: 1/1;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.7), transparent 0 4rem),
        linear-gradient(160deg, #0B4F6C 0%, #073A50 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      letter-spacing: .04em;
      font-size: clamp(2.4rem, 8vw, 4rem);
      box-shadow: 0 10px 30px rgba(11,79,108,.35);
      border: 6px solid #fff;
    }
    .wio-portrait-mono.alt .ring {
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.55), transparent 0 4rem),
        linear-gradient(160deg, #F2B544 0%, #B47A14 100%);
      box-shadow: 0 10px 30px rgba(242,181,68,.40);
    }

    /* Eyebrow / Pill */
    .wio-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: .4rem 1rem;
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .wio-eyebrow-accent {
      background: #FEF6E5;
      color: var(--accent-dark);
    }

    /* Accent-Line unter Headline */
    .wio-accent-line {
      width: 4.5rem;
      height: .25rem;
      border-radius: 999px;
      background: var(--accent);
      margin: 1rem auto 1.25rem;
    }
    .wio-accent-line.left { margin-inline: 0; }

    /* Buttons */
    .wio-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      border-radius: 999px;
      padding: .9rem 1.5rem;
      font-weight: 700;
      transition: transform .18s, box-shadow .18s, background-color .18s, color .18s, border-color .18s;
      cursor: pointer;
      border: 2px solid transparent;
      white-space: nowrap;
    }
    .wio-btn-primary { background: var(--primary); color: #fff; box-shadow: 0 14px 30px rgba(11,79,108,.25); }
    .wio-btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .wio-btn-accent { background: var(--accent); color: var(--ink); box-shadow: 0 14px 30px rgba(242,181,68,.35); }
    .wio-btn-accent:hover { background: #ECA72E; transform: translateY(-2px); color: var(--ink); }
    .wio-btn-outline { border-color: var(--primary); color: var(--primary); background: #fff; }
    .wio-btn-outline:hover { background: var(--primary-soft); transform: translateY(-2px); }
    .wio-btn-light { background: #fff; color: var(--primary); box-shadow: 0 16px 38px rgba(15,23,42,.16); }
    .wio-btn-light:hover { background: #F1FAFC; transform: translateY(-2px); }
    .wio-btn-ghost { color: var(--ink); }
    .wio-btn-ghost:hover { background: #F1F5F9; }

    /* Card */
    .wio-card {
      background: #fff;
      border: 1px solid rgba(11,79,108,.10);
      border-radius: 28px;
      padding: 1.6rem;
      box-shadow: 0 1px 2px rgba(15,23,42,.05), 0 1px 3px rgba(15,23,42,.08);
      transition: transform .2s, box-shadow .2s;
    }
    .wio-card:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(15,23,42,.10); }

    .wio-card-icon {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: var(--primary);
      background: var(--primary-soft);
      margin-bottom: 1.1rem;
      flex-shrink: 0;
    }
    .wio-card-icon.accent { color: var(--accent-dark); background: #FEF6E5; }

    /* Maßnahme-Karte: linke Akzentlinie */
    .wio-measure-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 6px 18px rgba(15,23,42,.06);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }
    .wio-measure-card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(15,23,42,.12); }

    /* Service / CTA-Section in Primärfarbe */
    .wio-cta-section {
      background:
        radial-gradient(ellipse at 100% 0%, rgba(242,181,68,.22), transparent 50%),
        radial-gradient(ellipse at 0% 100%, rgba(255,255,255,.10), transparent 50%),
        linear-gradient(135deg, #0B4F6C 0%, #073A50 100%);
      color: #fff;
      border-radius: clamp(28px, 6vw, 48px);
      padding: clamp(2rem, 5vw, 4rem);
      box-shadow: 0 24px 60px rgba(15,23,42,.20);
      position: relative;
      overflow: hidden;
    }

    /* Number Mark im Footer */
    .wio-number-mark {
      display: inline-grid;
      place-items: center;
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 800;
      font-size: .9rem;
      margin-right: .65rem;
    }

    /* Stat-Block */
    .wio-stat {
      background: #fff;
      border-radius: 24px;
      padding: 1.75rem 1.5rem;
      text-align: center;
      box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 4px 14px rgba(15,23,42,.06);
      border: 1px solid var(--line);
    }
    .wio-stat-num {
      font-size: clamp(2.2rem, 5vw, 3.25rem);
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -.04em;
    }
    .wio-stat-num.accent { color: var(--accent-dark); }

    /* FAQ Items */
    .wio-faq-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .wio-faq-item.open { box-shadow: 0 8px 24px rgba(15,23,42,.08); border-color: rgba(11,79,108,.2); }

    /* Tab-Pill aktiv */
    .wio-tab {
      padding: .5rem 1rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: .9rem;
      cursor: pointer;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--body);
      transition: all .15s;
    }
    .wio-tab:hover { color: var(--ink); border-color: var(--primary); }
    .wio-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Decorative Shapes */
    .wio-decor-blob {
      position: absolute;
      pointer-events: none;
      filter: blur(40px);
      opacity: .25;
    }

    /* QR Placeholder */
    .wio-qr {
      width: 9rem;
      height: 9rem;
      border-radius: 18px;
      background: #fff;
      padding: .75rem;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    .wio-qr-pattern {
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(45deg, var(--ink) 25%, transparent 25%),
        linear-gradient(-45deg, var(--ink) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--ink) 75%),
        linear-gradient(-45deg, transparent 75%, var(--ink) 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0px;
      border-radius: 8px;
    }

    /* Smooth Page Transitions */
    .wio-view-enter { animation: wioFade .28s ease-out; }
    @keyframes wioFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Menü */
    .wio-mobile-menu {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #fff;
      border-top: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(15,23,42,.10);
    }

    /* Hide scrollbar on horizontal pill bar */
    .wio-scroll-x::-webkit-scrollbar { display: none; }
    .wio-scroll-x { scrollbar-width: none; }

    /* Print clean */
    @media print {
      .wio-nav, .wio-cta-section, .wio-mobile-menu { display: none !important; }
    }
  </style>
</head>

    function Icon({ name, size = 22, strokeWidth = 2, className = '', ...rest }) {
      const path = SVG_PATHS[name];
      if (!path) return null;
      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          aria-hidden="true"
          {...rest}
        >{path}</svg>
      );
    }

    /* =========================================================
       Photo – wiederverwendbare <picture> mit WebP + JPG-Fallback
       und srcset für Retina. Liegt in /images/ relativ zur HTML-Datei.
       Lädt lazy, mit asynchroner Decodierung und 'eager' nur bei Hero.
       ========================================================= */
    function Photo({ slug, alt, kind = 'wide', loading = 'lazy', className = '' }) {
      // kind: 'wide' (3:2 -> 800/1600) | 'portrait' (4:5 -> 600/1100)
      const sizes = kind === 'portrait' ? [600, 1100] : [800, 1600];
      const small = sizes[0], big = sizes[1];
      const base = './images/' + slug;
      return (
        <picture>
          <source
            type="image/webp"
            srcSet={`${base}-${small}.webp ${small}w, ${base}-${big}.webp ${big}w`}
            sizes={kind === 'portrait' ? '(max-width: 640px) 90vw, 320px' : '(max-width: 768px) 92vw, 800px'}
          />
          <img
            src={`${base}-${big}.jpg`}
            alt={alt}
            loading={loading}
            decoding="async"
            className={className}
          />
        </picture>
      );
    }

    /* =========================================================
       EDIT-MODUS – Adressierungssystem für Änderungswünsche
       Persistiert die Toggle-Einstellung in localStorage.
       ========================================================= */
    const EditModeContext = React.createContext({ enabled: false, toggle: () => {} });

    function useEditMode() { return React.useContext(EditModeContext); }

    function EditModeProvider({ children }) {
      const [enabled, setEnabled] = React.useState(() => {
        try { return localStorage.getItem('wio-edit-mode') === '1'; } catch (e) { return false; }
      });
      const toggle = React.useCallback(() => {
        setEnabled(v => {
          const next = !v;
          try { localStorage.setItem('wio-edit-mode', next ? '1' : '0'); } catch (e) {}
          return next;
        });
      }, []);
      // Body-Klasse setzen, damit CSS auf .edit-mode reagieren kann
      React.useEffect(() => {
        document.body.classList.toggle('edit-mode', enabled);
      }, [enabled]);

      // Auto-Marker für Elemente mit data-edit-id (die nicht von <E> kommen).
      // Diese Marker werden direkt im DOM angeheftet. So bekommt man auch Marker
      // für Sektionen, ohne dass jede einzelne <section>/<div> in <E> gewrappt werden muss.
      React.useEffect(() => {
        if (!enabled) {
          document.querySelectorAll('.edit-marker-auto').forEach(el => el.remove());
          document.querySelectorAll('[data-edit-id-auto]').forEach(el => {
            el.classList.remove('edit-target');
            el.style.position = '';
          });
          return;
        }
        // Sammle alle Elemente mit data-edit-id, die noch keinen Marker haben
        const targets = document.querySelectorAll('[data-edit-id]:not([data-edit-id-rendered])');
        targets.forEach(el => {
          if (el.querySelector(':scope > .edit-marker')) return;
          el.setAttribute('data-edit-id-auto', '1');
          const id = el.getAttribute('data-edit-id');
          const computed = window.getComputedStyle(el).position;
          if (computed === 'static') el.style.position = 'relative';
          el.classList.add('edit-target');
          const depth = id.split('.').length;
          const cls = depth <= 2 ? 'edit-marker-section' : depth <= 3 ? 'edit-marker-block' : 'edit-marker-leaf';
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = `edit-marker edit-marker-auto ${cls}`;
          btn.textContent = id;
          btn.title = `Klicken zum Kopieren: ${id}`;
          btn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            try {
              navigator.clipboard.writeText(id);
              btn.textContent = '✓ kopiert';
              btn.classList.add('edit-marker-flash');
              setTimeout(() => { btn.textContent = id; btn.classList.remove('edit-marker-flash'); }, 900);
            } catch (err) {}
          });
          el.appendChild(btn);
        });
      });

      return (
        <EditModeContext.Provider value={{ enabled, toggle }}>
          {children}
        </EditModeContext.Provider>
      );
    }

    /* E – wiederverwendbarer Wrapper, vergibt jedem Element eine eindeutige
       Adresse (id). Im Edit-Modus erscheint ein Klick-zum-Kopieren-Marker.
       Verwendung:
         <E id="home.hero.headline" tag="h1" className="...">Text</E>
       'tag' ist optional (Default: 'span'). 'as'-Modus akzeptiert beliebige
       HTML-Elemente. Kann Kinder beliebig schachteln. */
    function E({ id, tag = 'span', children, className = '', ...rest }) {
      const { enabled } = useEditMode();
      const Tag = tag;
      const [flash, setFlash] = React.useState(false);

      const copyId = (e) => {
        if (!enabled) return;
        e.preventDefault();
        e.stopPropagation();
        try {
          navigator.clipboard.writeText(id);
          setFlash(true);
          setTimeout(() => setFlash(false), 900);
        } catch (err) { /* ignore */ }
      };

      // Marker-Style abhängig von ID-Tiefe (Sektion vs. Element)
      const depth = id.split('.').length;
      const markerClass = depth <= 2 ? 'edit-marker edit-marker-section'
                         : depth <= 3 ? 'edit-marker edit-marker-block'
                         : 'edit-marker edit-marker-leaf';

      return (
        <Tag
          data-edit-id={id}
          className={`${className} ${enabled ? 'edit-target' : ''}`.trim()}
          {...rest}
        >
          {children}
          {enabled && (
            <button
              type="button"
              className={`${markerClass} ${flash ? 'edit-marker-flash' : ''}`}
              onClick={copyId}
              title={`Klicken zum Kopieren: ${id}`}
            >{flash ? '✓ kopiert' : id}</button>
          )}
        </Tag>
      );
    }

    /* Schalter unten rechts. Außerhalb des Edit-Modus minimal & dezent;
       im Edit-Modus deutlich sichtbar mit Statusanzeige. */
    function EditModeToggle() {
      const { enabled, toggle } = useEditMode();
      const [showHelp, setShowHelp] = React.useState(false);
      return (
        <>
          <div className={`edit-toggle ${enabled ? 'edit-toggle-active' : ''}`}>
            <button
              type="button"
              onClick={toggle}
              className="edit-toggle-btn"
              title={enabled ? 'Edit-Modus ausschalten' : 'Edit-Modus einschalten – zeigt Element-IDs'}
              aria-label="Edit-Modus umschalten"
            >
              <Icon name={enabled ? 'x' : 'help-circle'} size={18} />
              <span>{enabled ? 'Edit-Modus AN' : 'Edit'}</span>
            </button>
            {enabled && (
              <button
                type="button"
                onClick={() => setShowHelp(v => !v)}
                className="edit-toggle-help"
                title="Hilfe zum Edit-Modus"
              >?</button>
            )}
          </div>
          {enabled && showHelp && (
            <div className="edit-help" onClick={() => setShowHelp(false)}>
              <div className="edit-help-card" onClick={e => e.stopPropagation()}>
                <button onClick={() => setShowHelp(false)} className="edit-help-close" aria-label="Schließen">
                  <Icon name="x" size={20} />
                </button>
                <h3>Edit-Modus · Kurz erklärt</h3>
                <p>Jedes änderbare Element hat eine kleine gelbe Plakette mit seiner <strong>Adresse</strong> (z. B. <code>home.hero.headline</code>).</p>
                <ul>
                  <li><strong>Klick auf eine Plakette</strong> kopiert die Adresse in die Zwischenablage.</li>
                  <li><strong>Plakette zeigt „✓ kopiert"</strong> für 1 Sekunde zur Bestätigung.</li>
                  <li>Adressen tragt ihr in eure Wunschliste ein, mit ALT-/NEU-Werten.</li>
                  <li>Farben der Plaketten: <span className="edit-legend edit-legend-section">Sektion</span> · <span className="edit-legend edit-legend-block">Block</span> · <span className="edit-legend edit-legend-leaf">Einzelnes Element</span></li>
                </ul>
                <p className="edit-help-tip">Tipp: Toggle bleibt auch nach Neuladen aktiv (gespeichert im Browser).</p>
              </div>
            </div>
          )}
        </>
      );
    }

    // ============ APP ============
    function App() {
      const [route, setRouteState] = React.useState('home');

      // Unified navigation – passed under both prop names so old/new components both work.
      const go = (r) => { setRouteState(r); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      const openMassnahme = (id) => { setRouteState('massnahme/' + id); window.scrollTo({ top: 0, behavior: 'smooth' }); };

      let view;
      if (route.startsWith('massnahme/')) {
        const id = route.split('/')[1];
        view = <MassnahmeDetail id={id} setRoute={go} openMassnahme={openMassnahme} />;
      } else if (route === 'massnahmen') view = <MassnahmenView setRoute={go} openMassnahme={openMassnahme} />;
      else if (route === 'team') view = <TeamView setRoute={go} />;
      else if (route === 'azav') view = <AzavView setRoute={go} />;
      else if (route === 'kontakt') view = <KontaktView go={go} />;
      else if (route === 'faq') view = <FaqView go={go} />;
      else if (route === 'impressum') view = <ImpressumView />;
      else if (route === 'datenschutz') view = <DatenschutzView />;
      else view = <HomeView setRoute={go} openMassnahme={openMassnahme} />;

      return (
        <EditModeProvider>
          <div className="min-h-screen flex flex-col">
            <Nav route={route} setRoute={go} />
            <main className="flex-1">{view}</main>
            <Footer setRoute={go} />
            <EditModeToggle />
          </div>
        </EditModeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
